name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  publish:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update manifest.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies and build
        run: npm ci && npm run build

      - name: Build zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="clio-satellite-$VERSION.zip"

          zip -r "$ZIP_NAME" . \
            -x "*.md" \
            -x "*/.DS_Store" \
            -x ".DS_Store" \
            -x "*.html" \
            -x "*.backup" \
            -x "*.sh" \
            -x ".gitignore" \
            -x ".github/*" \
            -x "src/*" \
            -x "tests/*" \
            -x "dev/*" \
            -x "docs/*" \
            -x "build/*" \
            -x "node_modules/*" \
            -x "vitest.config.js" \
            -x "package.json" \
            -x "package-lock.json" \
            -x ".git/*" \
            -x ".venv/*"

          zip -uj "$ZIP_NAME" options.html
          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.zip_name }}

      - name: Get Chrome Web Store access token
        id: cwstoken
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=${{ secrets.CWS_CLIENT_ID }} \
            -d client_secret=${{ secrets.CWS_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.CWS_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token: $RESPONSE"
            exit 1
          fi
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Upload to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}" \
            -H "Authorization: Bearer ${{ steps.cwstoken.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -T "${{ env.zip_name }}")
          STATUS=$(echo "$RESPONSE" | jq -r '.uploadState // empty')
          echo "Upload state: $STATUS"
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "Upload failed: $RESPONSE"
            exit 1
          fi

      - name: Publish to Chrome Web Store
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CWS_EXTENSION_ID }}/publish" \
            -H "Authorization: Bearer ${{ steps.cwstoken.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")
          echo "Publish response: $RESPONSE"
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "Publish failed: $RESPONSE"
            exit 1
          fi
